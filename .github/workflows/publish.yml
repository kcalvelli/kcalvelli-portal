name: publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Render architecture diagrams
        run: nix develop -c ./scripts/render-diagrams.sh

      - name: Verify site builds (strict)
        run: nix develop -c mkdocs build --strict

      - name: Deploy to GitHub Pages
        run: nix develop -c mkdocs gh-deploy --force

name: discover

on:
  schedule:
    # Monday morning US East — gives a fresh PR at the start of each week.
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run drift detector
        id: discover
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop -c ./scripts/discover.sh

      - name: Re-render diagrams
        if: steps.discover.outputs.drift == 'true'
        run: nix develop -c ./scripts/render-diagrams.sh

      - name: Open pull request
        if: steps.discover.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BRANCH="discovery/$(date -u +%Y-%m-%d)"
          git config user.name  "kcalvelli-portal bot"
          git config user.email "bot@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Portfolio drift: scheduled discovery $(date -u +%Y-%m-%d)"
          git push -u origin "$BRANCH"

          # Write the summary body to a tempfile so gh can read it without
          # shell-quoting the multi-line string.
          cat > /tmp/pr-body.md <<'BODY_EOF'
          ${{ steps.discover.outputs.summary }}
          BODY_EOF

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Portfolio drift detected ($(date -u +%Y-%m-%d))" \
            --body-file /tmp/pr-body.md \
            --label automated

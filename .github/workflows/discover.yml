name: discover

on:
  schedule:
    # Monday morning US East — gives a fresh PR at the start of each week.
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Run drift detector
        id: discover
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop -c ./scripts/discover.sh

      - name: Re-render diagrams
        if: steps.discover.outputs.drift == 'true'
        run: nix develop -c ./scripts/render-diagrams.sh

      - name: Open pull request
        if: steps.discover.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BRANCH="discovery/$(date -u +%Y-%m-%d)"
          git config user.name  "kcalvelli-portal bot"
          git config user.email "bot@users.noreply.github.com"

          git checkout -b "$BRANCH"
          # Summary file is intentionally excluded — it's a runtime artifact,
          # not part of the committed change set.
          git add -A
          git reset -- discovery-summary.md 2>/dev/null || true
          git commit -m "Portfolio drift: scheduled discovery $(date -u +%Y-%m-%d)"
          git push -u origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Portfolio drift detected ($(date -u +%Y-%m-%d))" \
            --body-file "${{ steps.discover.outputs.summary_file }}" \
            --label automated

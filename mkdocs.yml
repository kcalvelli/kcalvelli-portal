site_name: Keith Calvelli
site_description: Engineering portfolio — NixOS, AI infrastructure, retro computing
site_url: https://kcalvelli.github.io/kcalvelli-portal/

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: teal
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Portfolio: index.md
  - Featured:
      - Cairn: cairn.md
      - Cairn Companion: cairn-companion.md
      - MCP Gateway: mcp-gateway.md
      - Cairn Sentinel: cairn-sentinel.md
  - Platform & Infrastructure:
      - Cairn Monitor: cairn-monitor.md
      - Brave Browser Previews: brave-browser-previews.md
      - Nix Voice Assistant: nix-voice-assistant.md
  - AI & MCP:
      - Sid Assistant: sid-assistant.md
  - Communication:
      - Cairn Mail: cairn-mail.md
      - Cairn DAV: cairn-dav.md
      - Cairn Chat: cairn-chat.md
  - Retro Computing:
      - Ultimate64 MCP: Ultimate64MCP.md
      - C64 Stream Viewer: c64-stream-viewer.md
      - C64 Terminal: c64term.md
  - Orthodox & Personal:
      - Orthoterm: orthoterm.md
      - Diner Placemat: dinerplacemat.md
      - Peregrinatio RPG: peregrinatio-rpg.md
  - Meta:
      - This Portal: kcalvelli-portal.md

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
  <meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}{{ config.description }}{% endblock %}">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="{{ get_url(path='style.css') }}">
</head>
<body>
  <header class="site-header">
    <a href="{{ config.base_url | safe }}" class="site-title">Keith Calvelli</a>
    <nav class="site-nav">
      {% for cat in config.extra.categories %}
      <a href="{{ get_url(path=cat.slug ~ '/') }}">{{ cat.name }}</a>
      {% endfor %}
    </nav>
  </header>

  <main class="site-main">
    {% block main %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div>
      <a href="https://github.com/{{ config.extra.github }}">GitHub</a>
      · {{ config.extra.location }}
    </div>
    <div class="footer-meta">
      Built with <a href="https://www.getzola.org">Zola</a> and <a href="https://structurizr.com/dsl">Structurizr DSL</a>.
      <a href="https://github.com/kcalvelli/kcalvelli-portal">Source</a>.
    </div>
  </footer>
</body>
</html>
